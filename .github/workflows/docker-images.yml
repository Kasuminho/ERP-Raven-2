name: Build Docker images

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NEXT_PUBLIC_API_URL: https://app.guild-g3x.com.br/api/v1
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/raven2_e2e?schema=public

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: raven2_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d raven2_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate --schema packages/database/prisma/schema.prisma

      - name: Generate Prisma client
        run: npx prisma generate --schema packages/database/prisma/schema.prisma

      - name: Lint
        run: npm run lint

      - name: Test critical domain rules
        run: npm run test:ci

      - name: Apply migrations to disposable PostgreSQL
        run: npx prisma migrate deploy --schema packages/database/prisma/schema.prisma

      - name: Test critical transactional flows
        run: npm run test:e2e
        env:
          E2E_DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Audit production dependencies
        run: npm run audit:ci

      - name: Build API
        run: npm run build --workspace apps/api

      - name: Build Web
        run: npm run build --workspace apps/web
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}

  build:
    name: Build and publish
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          push: true
          build-args: |
            APP_VERSION=${{ env.SHORT_SHA }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-api:latest
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-api:${{ env.SHORT_SHA }}

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            APP_VERSION=${{ env.SHORT_SHA }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-web:latest
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-web:${{ env.SHORT_SHA }}

  deploy-smoke:
    name: Public production smoke
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for Watchtower polling window
        run: sleep 330  # ← Aumenta de 330 para 600s (10 minutos)

      - name: Check public API health
        timeout-minutes: 15
        run: |
          export EXPECTED_VERSION="${GITHUB_SHA::7}"
          node scripts/public-smoke-test.js
        env:
          SMOKE_BASE_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          SMOKE_ATTEMPTS: 30  # ← Aumenta tentativas de 24 para 30
          SMOKE_DELAY_MS: 20000
          SMOKE_FETCH_TIMEOUT_MS: 10000
          SMOKE_DNS_ORDER: ipv4first
          SMOKE_USER_AGENT: Raven2PublicSmoke/1.0
          SMOKE_ALLOW_EDGE_CHALLENGE: 1

      - name: Check authenticated staff API
        run: |
          if [ -z "$SMOKE_AUTH_TOKEN" ]; then
            echo "Authenticated smoke skipped: PRODUCTION_SMOKE_BEARER_TOKEN is not configured."
            exit 0
          fi
          node scripts/authenticated-smoke-test.js
        env:
          SMOKE_BASE_URL: ${{ env.NEXT_PUBLIC_API_URL }}
          SMOKE_AUTH_TOKEN: ${{ secrets.PRODUCTION_SMOKE_BEARER_TOKEN }}
          SMOKE_RESULT_PATH: artifacts/authenticated-smoke.json

      - name: Preserve authenticated smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: authenticated-smoke-${{ github.sha }}
          path: artifacts/authenticated-smoke.json
          if-no-files-found: ignore
          retention-days: 30
