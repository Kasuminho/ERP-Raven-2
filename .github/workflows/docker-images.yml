name: Build Docker images

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NEXT_PUBLIC_API_URL: https://app.guild-g3x.com.br/api/v1

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        run: |
          echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-api:latest
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-api:${{ env.SHORT_SHA }}

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-web:latest
            ghcr.io/${{ env.OWNER_LC }}/erp-raven-2-web:${{ env.SHORT_SHA }}
