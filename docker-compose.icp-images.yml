services:
  api:
    image: ghcr.io/kasuminho/erp-raven-2-api:${DEPLOY_IMAGE_TAG:-latest}
    container_name: guild-api
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKUP_STATUS_FILE: /app/backups/last-verified-backup.json
    ports:
      - '127.0.0.1:${API_HOST_PORT:-3000}:3000'
    volumes:
      - ${UPLOADS_HOST_DIR:-/srv/guild/uploads}:/app/uploads
      - ${BACKUP_DIR:-/srv/guild/backups}:/app/backups:ro
    networks:
      - icontainer
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: ${API_MEMORY_LIMIT:-1536m}
    cpus: ${API_CPU_LIMIT:-2.0}

  web:
    image: ghcr.io/kasuminho/erp-raven-2-web:${DEPLOY_IMAGE_TAG:-latest}
    container_name: guild-web
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://app.guild-g3x.com.br/api/v1}
    ports:
      - '127.0.0.1:${WEB_HOST_PORT:-5173}:5173'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - icontainer
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:5173/login']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: ${WEB_MEMORY_LIMIT:-1024m}
    cpus: ${WEB_CPU_LIMIT:-1.5}

  watchtower:
    image: containrrr/watchtower:latest
    container_name: guild-watchtower
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: '1.40'
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_INCLUDE_RESTARTING: 'true'
      WATCHTOWER_POLL_INTERVAL: 300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    mem_limit: ${WATCHTOWER_MEMORY_LIMIT:-256m}
    cpus: ${WATCHTOWER_CPU_LIMIT:-0.5}

networks:
  icontainer:
    external: true
    name: ${ICP_SHARED_NETWORK:?ICP_SHARED_NETWORK is required}
