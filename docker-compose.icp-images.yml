services:
  api:
    image: ghcr.io/kasuminho/erp-raven-2-api:latest
    container_name: guild-api
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '127.0.0.1:${API_HOST_PORT:-3000}:3000'

  web:
    image: ghcr.io/kasuminho/erp-raven-2-web:latest
    container_name: guild-web
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://app.guild-g3x.com.br/api/v1}
    ports:
      - '127.0.0.1:${WEB_HOST_PORT:-5173}:5173'
    depends_on:
      - api

  watchtower:
    image: containrrr/watchtower:latest
    container_name: guild-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_LABEL_ENABLE: 'true'
      WATCHTOWER_CLEANUP: 'true'
      WATCHTOWER_INCLUDE_RESTARTING: 'true'
      WATCHTOWER_POLL_INTERVAL: 300
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
