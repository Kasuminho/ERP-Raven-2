services:
  postgres:
    image: postgres:16-alpine
    container_name: guild-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-guild_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-1536m}
    cpus: ${POSTGRES_CPU_LIMIT:-2.0}

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-development}
    container_name: guild-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-guild_platform}?schema=public&connection_limit=${DATABASE_CONNECTION_LIMIT:-8}&pool_timeout=10
    ports:
      - '127.0.0.1:${API_HOST_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    mem_limit: ${API_MEMORY_LIMIT:-1536m}
    cpus: ${API_CPU_LIMIT:-2.0}

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
        APP_VERSION: ${APP_VERSION:-development}
    container_name: guild-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - '127.0.0.1:${WEB_HOST_PORT:-5173}:5173'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://127.0.0.1:5173/login']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: ${WEB_MEMORY_LIMIT:-1024m}
    cpus: ${WEB_CPU_LIMIT:-1.5}

volumes:
  postgres_data:
